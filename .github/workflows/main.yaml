name: CI
on: [push]

jobs:
    test:
        runs-on: ubuntu-latest
        #container:
        #    image: coderus/sailfishos-platform-sdk:5.0.0.43
        container: coderus/sailfishos-platform-sdk:5.0.0.43

        steps:
            # can't use actions/checkout (no node)
            #- uses: actions/checkout@v6
            - name: Debug
              run: |
                pwd
                whoami
                ls -lha
                echo $PATH
                which sudo||true
                #which devel-su||true

            - name: Checkout
              run: |
                export HOME=/home/mersdk
                cd $HOME
                git clone "https://github.com/$GITHUB_REPOSITORY.git" build

            - name: Try to build a simple program and run it
              run: |
                export HOME=/home/mersdk
                cd $HOME/build
                
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-init
                pwd
                ls -lha
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-shell pwd
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-shell ls -lha
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-shell gcc main.c -o test
                mb2 -t $VENDOR-$DEVICE-$PORT_ARCH build-shell ./test