name: CI
on: [push]

jobs:
    test:
        runs-on: ubuntu-latest
        #container:
        #    image: coderus/sailfishos-platform-sdk:5.0.0.43
        container: coderus/sailfishos-platform-sdk:5.0.0.43

        steps:
            # can't use actions/checkout (no node)
            #- uses: actions/checkout@v6
            - name: Debug
              run: |
                pwd
                whoami
                ls -lha
                echo $PATH
                which sudo||true
                #which devel-su||true

            - name: Checkout
              run: |
                sudo mkdir workspace
                sudo chmod a+rw /workspace
                cd /workspace
                git init --quiet
                git remote add origin "https://github.com{{ github.repository }}.git"
                git fetch --quiet --no-tags --depth=1 origin "${{ github.sha }}"
                git checkout --quiet FETCH_HEAD

            - name: Try to build a simple program and run it
              run: |
                ls -lha
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-init
                mb2 -t SailfishOS-5.0.0.43-armv7hl build-shell gcc main.c -o test
                mb2 -t $VENDOR-$DEVICE-$PORT_ARCH build-shell ./test